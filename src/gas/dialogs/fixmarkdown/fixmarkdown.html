<!DOCTYPE html>
<html>
<head>
  <style>/* BUILD:INLINE_CSS */</style>
</head>
<body>
  <script>(function(){var t=document.createElement('div');t.tabIndex=0;t.style.cssText='position:fixed;opacity:0;width:0;height:0;overflow:hidden';t.setAttribute('aria-hidden','true');document.body.insertBefore(t,document.body.firstChild);function f(){t.focus({preventScroll:true})}var d=[0,50,100,150,200,300,500,800,1200];for(var i=0;i<d.length;i++)setTimeout(f,d[i]);setTimeout(function(){t.tabIndex=-1},1500)})();</script>
  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" data-view="normal">Fixed Output</button>
      <button class="tab" data-view="diff">Diff</button>
    </div>
    <div class="toolbar-spacer"></div>
    <span id="status" class="status"></span>
    <button id="copyBtn" class="btn btn-filled-primary" disabled>Copy Fixed Markdown</button>
  </div>

  <div class="panels visible" id="normalView">
    <div class="panel">
      <div class="panel-label">Pasted Markdown <button class="paste-hint" id="pasteBtn">Paste</button></div>
      <div class="input-wrap">
        <textarea id="input" placeholder="Paste markdown here…" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">Fixed Output</div>
      <div class="output-scroll" id="output-wrap">
        <div id="output" class="output-content empty">Output will appear here</div>
      </div>
    </div>
  </div>

  <div class="panels" id="diffView">
    <div class="panel">
      <div class="panel-label">Before</div>
      <div class="diff-scroll">
        <div id="diffBefore" class="diff-content"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-label">After</div>
      <div class="diff-scroll">
        <div id="diffAfter" class="diff-content"></div>
      </div>
    </div>
  </div>

  <script>/* BUILD:INLINE_JS */</script>
</body>
</html>
