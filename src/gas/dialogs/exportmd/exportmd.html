<!DOCTYPE html>
<html>
<head>
  <style>/* BUILD:INLINE_CSS */</style>

<body>
  <!-- BUILD:FOCUS_TRAP -->
  <div class="toolbar">
    <div class="toolbar-spacer"></div>
    <button class="btn btn-filled-primary" id="copy-btn" disabled>Copy to Clipboard</button>
  </div>

  <div class="content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Exporting document as markdown...</p>
      <p class="loading-hint">This may take a moment for large documents.</p>
    </div>
    <textarea id="output" spellcheck="false" readonly style="display:none"></textarea>
  </div>

  <div id="checkbox-notice" class="notice" style="display:none">
    <strong>Note:</strong> Checkboxes are exported as unchecked (<code>[ ]</code>) due to a Google API limitation.
    <a href="https://mermaid.numanaral.dev/limitations?utm_source=addon&amp;utm_medium=exportmd&amp;utm_campaign=mermaid_toolkit#workarounds" target="_blank" rel="noopener">See workarounds</a>
  </div>
  <div id="status">Exporting...</div>

  <script>/* BUILD:INLINE_JS */</script>
</body>
</html>
