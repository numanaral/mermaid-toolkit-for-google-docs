<!DOCTYPE html>
<html>
<head>
  <style>/* BUILD:INLINE_CSS */</style>
</head>
<body>
  <!-- BUILD:FOCUS_TRAP -->

  <div class="action-grid">
    <button class="action-card" id="btn-inspector" role="button">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div class="action-label">Document Inspector</div>
      <div class="action-desc">Walk the document structure via DocumentApp — paragraphs, lists, tables, and text formatting.</div>
    </button>

    <button class="action-card" id="btn-doc-info" role="button">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </div>
      <div class="action-label">Document Info</div>
      <div class="action-desc">Show document ID, active tab, child count, and metadata.</div>
    </button>
  </div>

  <div id="loading" class="loading" style="display:none">
    <div class="spinner"></div>
    <p id="loading-msg">Running...</p>
    <p class="loading-hint">This may take a moment.</p>
  </div>

  <div id="status"></div>

  <script>/* BUILD:INLINE_JS */</script>
</body>
</html>
