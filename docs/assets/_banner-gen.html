<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: white; overflow: hidden; }
  .banner {
    width: 220px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 12px 10px 8px;
    background: white;
  }
  .icon {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }
  .text {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #2e8b8b;
    line-height: 1.25;
  }
  .text .nowrap {
    white-space: nowrap;
  }
  .text .tm {
    font-size: 8px;
    vertical-align: super;
    line-height: 0;
  }
</style>
</head>
<body>
<div class="banner" id="banner">
  <img class="icon" src="icon-128.png" alt="icon">
  <div class="text">Mermaid Toolkit for <span class="nowrap">Google Docs<span class="tm">™</span></span></div>
</div>
</body>
</html>
